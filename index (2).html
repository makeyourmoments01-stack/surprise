<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body {
  background: radial-gradient(ellipse at 50% 80%, #0d0018 0%, #04000d 60%, #000008 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Jost', sans-serif;
  color: #fff;
}

/* STARS */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{opacity:0.2;transform:scale(1);}
  50%{opacity:1;transform:scale(1.3);}
}

/* MAIN CONTAINER */
.scene {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100vw;
  padding: 20px;
}

/* TOP TEXT */
.top-text {
  text-align: center;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 1s 0.5s forwards;
}
.top-text .line1 {
  font-family: 'Jost', sans-serif;
  font-size: clamp(0.65rem, 2vw, 0.8rem);
  letter-spacing: 6px;
  color: #ffb3c6;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.top-text .line2 {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  color: #fff;
  text-shadow: 0 0 40px rgba(255,150,180,0.5);
  line-height: 1;
}

/* TREE SVG */
#treeCanvas {
  width: min(380px, 90vw);
  height: min(380px, 90vw);
  position: relative;
}

/* HEARTS container */
#heartsContainer {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.heart-bloom {
  position: absolute;
  font-size: clamp(14px, 3.5vw, 22px);
  opacity: 0;
  transform: scale(0) rotate(-20deg);
  transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  filter: drop-shadow(0 0 6px rgba(255,100,150,0.8));
}
.heart-bloom.show {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}

/* BOTTOM LINES */
.lines-wrap {
  text-align: center;
  margin-top: 12px;
  max-width: 340px;
}
.bline {
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.8s ease;
  margin-bottom: 6px;
}
.bline.show { opacity: 1; transform: translateY(0); }

.bline.name {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2rem, 7vw, 3.5rem);
  color: #ffb3c6;
  text-shadow: 0 0 30px rgba(255,150,180,0.6);
  line-height: 1.1;
}
.bline.sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  font-style: italic;
  color: rgba(255,220,230,0.75);
  letter-spacing: 1px;
}
.bline.counter {
  font-family: 'Jost', sans-serif;
  font-size: clamp(0.7rem, 2vw, 0.85rem);
  letter-spacing: 3px;
  color: rgba(255,179,198,0.6);
  text-transform: uppercase;
  margin-top: 4px;
}
.bline.days-count {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 5vw, 2.2rem);
  color: #ffd6e0;
  letter-spacing: 2px;
}
.bline.footer {
  font-size: clamp(0.65rem, 1.8vw, 0.75rem);
  letter-spacing: 4px;
  color: rgba(255,179,198,0.35);
  text-transform: uppercase;
  margin-top: 8px;
}

/* REPLAY BTN */
#replayBtn {
  opacity: 0;
  margin-top: 16px;
  padding: 10px 32px;
  background: transparent;
  border: 1px solid rgba(255,179,198,0.4);
  color: #ffb3c6;
  font-family: 'Jost', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 40px;
  transition: all 0.3s;
}
#replayBtn:hover { background: rgba(255,179,198,0.1); }
#replayBtn.show { opacity: 1; }

/* MUSIC */
#musicBar {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,0,20,0.8);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,179,198,0.15);
  border-radius: 40px;
  padding: 8px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 100;
  font-size: 0.68rem;
  letter-spacing: 2px;
  color: rgba(255,220,230,0.5);
}
#musicBar button {
  background: #c4607a;
  border: none;
  border-radius: 50%;
  width: 26px; height: 26px;
  color: white;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center;
}

@keyframes fadeUp {
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* FLOATING HEARTS */
.float-heart {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  animation: floatHeart linear infinite;
  font-size: 14px;
  opacity: 0;
}
@keyframes floatHeart {
  0%{transform:translateY(105vh) rotate(0deg);opacity:0.5;}
  100%{transform:translateY(-5vh) rotate(20deg);opacity:0;}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="floatingHearts"></div>

<div class="scene">
  <!-- TOP -->
  <div class="top-text">
    <div class="line1">✦ A Gift From The Heart ✦</div>
    <div class="line2">Happy Birthday</div>
  </div>

  <!-- TREE -->
  <div id="treeCanvas" style="position:relative;">
    <svg id="treeSvg" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
      <!-- TRUNK -->
      <path id="trunk" d="M190 360 Q185 320 183 290 Q180 260 190 230" 
        stroke="#8B5E3C" stroke-width="10" fill="none" stroke-linecap="round"
        stroke-dasharray="140" stroke-dashoffset="140"/>
      <!-- MAIN BRANCHES -->
      <path id="b1" d="M190 280 Q160 250 130 220" stroke="#8B5E3C" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="90" stroke-dashoffset="90"/>
      <path id="b2" d="M190 260 Q220 230 250 205" stroke="#8B5E3C" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="90" stroke-dashoffset="90"/>
      <path id="b3" d="M188 240 Q175 200 170 170" stroke="#7a5230" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="80" stroke-dashoffset="80"/>
      <path id="b4" d="M190 250 Q210 210 215 175" stroke="#7a5230" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="80" stroke-dashoffset="80"/>
      <!-- SUB BRANCHES -->
      <path id="s1" d="M130 220 Q105 195 85 175" stroke="#6b4828" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="65" stroke-dashoffset="65"/>
      <path id="s2" d="M130 220 Q118 188 115 165" stroke="#6b4828" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="60" stroke-dashoffset="60"/>
      <path id="s3" d="M250 205 Q275 180 295 160" stroke="#6b4828" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="65" stroke-dashoffset="65"/>
      <path id="s4" d="M250 205 Q262 175 265 150" stroke="#6b4828" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="65" stroke-dashoffset="65"/>
      <path id="s5" d="M170 170 Q155 140 145 115" stroke="#5c3d20" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="65" stroke-dashoffset="65"/>
      <path id="s6" d="M215 175 Q230 145 240 118" stroke="#5c3d20" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="65" stroke-dashoffset="65"/>
      <path id="s7" d="M190 230 Q190 195 190 165" stroke="#6b4828" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="70" stroke-dashoffset="70"/>
      <!-- TINY BRANCHES -->
      <path id="t1" d="M85 175 Q70 155 60 140" stroke="#4a3018" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="45" stroke-dashoffset="45"/>
      <path id="t2" d="M115 165 Q100 145 95 128" stroke="#4a3018" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="45" stroke-dashoffset="45"/>
      <path id="t3" d="M145 115 Q138 95 132 78" stroke="#4a3018" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="45" stroke-dashoffset="45"/>
      <path id="t4" d="M190 165 Q185 140 178 118" stroke="#4a3018" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="55" stroke-dashoffset="55"/>
      <path id="t5" d="M190 165 Q196 140 202 118" stroke="#4a3018" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="55" stroke-dashoffset="55"/>
      <path id="t6" d="M240 118 Q248 98 252 82" stroke="#4a3018" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="45" stroke-dashoffset="45"/>
      <path id="t7" d="M265 150 Q278 130 288 115" stroke="#4a3018" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="45" stroke-dashoffset="45"/>
      <path id="t8" d="M295 160 Q308 140 318 125" stroke="#4a3018" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="45" stroke-dashoffset="45"/>
    </svg>
    <div id="heartsContainer"></div>
  </div>

  <!-- BOTTOM LINES -->
  <div class="lines-wrap">
    <div class="bline name" id="bl1">My Dearest Girl</div>
    <div class="bline sub" id="bl2">"You make every moment magical ✨"</div>
    <div class="bline counter" id="bl3">Together Since</div>
    <div class="bline days-count" id="bl4" data-days="0">— Days of Pure Love —</div>
    <div class="bline sub" id="bl5">Today is all about you. Happy Birthday 🎀</div>
    <div class="bline footer" id="bl6">Make Your Moments ✦</div>
  </div>

  <button id="replayBtn" onclick="startAnimation()">↩ Replay</button>
</div>

<!-- MUSIC -->
<div id="musicBar">
  <span>🎵</span>
  <span>Birthday Song</span>
  <button id="musicBtn" onclick="toggleMusic()">▶</button>
</div>
<audio id="bgMusic" loop>
  <source src="birthday_song.mp3" type="audio/mpeg"/>
</audio>

<script>
// STARS
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s = document.createElement('div');
  s.className='star';
  const sz = 1+Math.random()*2.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

// FLOATING HEARTS
const fhEl = document.getElementById('floatingHearts');
const hEmojis = ['💗','💕','🌸','💖','✨','💝','🌷'];
for(let i=0;i<12;i++){
  const h=document.createElement('div');
  h.className='float-heart';
  h.textContent=hEmojis[Math.floor(Math.random()*hEmojis.length)];
  h.style.cssText=`left:${Math.random()*100}vw;animation-duration:${10+Math.random()*15}s;animation-delay:${Math.random()*15}s;font-size:${10+Math.random()*12}px;`;
  fhEl.appendChild(h);
}

// MUSIC
const audio = document.getElementById('bgMusic');
let playing = false;
function tryPlay(){audio.play().then(()=>{playing=true;document.getElementById('musicBtn').textContent='⏸';}).catch(()=>{});}
function toggleMusic(){if(playing){audio.pause();playing=false;document.getElementById('musicBtn').textContent='▶';}else tryPlay();}
document.addEventListener('click',function t(){if(!playing)tryPlay();document.removeEventListener('click',t);},{once:true});

// BRANCH ANIMATION
const branches = ['trunk','b1','b2','b3','b4','s1','s2','s3','s4','s5','s6','s7','t1','t2','t3','t4','t5','t6','t7','t8'];
function animateBranch(id, delay, duration){
  setTimeout(()=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.style.transition=`stroke-dashoffset ${duration}ms ease`;
    el.style.strokeDashoffset='0';
  }, delay);
}

// HEART POSITIONS (x%, y% relative to treeCanvas)
const heartPositions = [
  {x:12,y:32},{x:22,y:25},{x:18,y:40},{x:8,y:50},
  {x:56,y:38},{x:68,y:28},{x:72,y:45},{x:80,y:35},
  {x:33,y:12},{x:42,y:8},{x:50,y:15},{x:38,y:20},
  {x:58,y:12},{x:64,y:7},{x:44,y:22},{x:28,y:18},
  {x:82,y:22},{x:76,y:15},{x:25,y:55},{x:70,y:55},
  {x:48,y:30},{x:36,y:32},{x:54,y:25},{x:44,y:35},
  {x:16,y:18},{x:62,y:20},{x:30,y:8},{x:52,y:42},
];
const heartEmojis = ['💗','💕','💖','🌸','💝','🌷','💗','💕'];

function spawnHeart(pos, delay){
  setTimeout(()=>{
    const h = document.createElement('div');
    h.className='heart-bloom';
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    h.style.left = pos.x+'%';
    h.style.top = pos.y+'%';
    document.getElementById('heartsContainer').appendChild(h);
    requestAnimationFrame(()=>requestAnimationFrame(()=>h.classList.add('show')));
  }, delay);
}

function showLine(id, delay){
  setTimeout(()=>{
    const el=document.getElementById(id);
    if(el) el.classList.add('show');
  },delay);
}

function startAnimation(){
  // Reset branches
  branches.forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      const len = parseFloat(el.getAttribute('stroke-dasharray'));
      el.style.transition='none';
      el.style.strokeDashoffset=len;
    }
  });
  // Reset hearts
  document.getElementById('heartsContainer').innerHTML='';
  // Reset lines
  ['bl1','bl2','bl3','bl4','bl5','bl6'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('show');
  });
  document.getElementById('replayBtn').classList.remove('show');

  // Animate branches
  animateBranch('trunk',100,800);
  animateBranch('b1',700,600);animateBranch('b2',750,600);
  animateBranch('b3',900,500);animateBranch('b4',950,500);animateBranch('s7',980,500);
  animateBranch('s1',1200,450);animateBranch('s2',1250,450);
  animateBranch('s3',1300,450);animateBranch('s4',1350,450);
  animateBranch('s5',1500,400);animateBranch('s6',1550,400);
  animateBranch('t1',1700,350);animateBranch('t2',1750,350);
  animateBranch('t3',1850,350);animateBranch('t4',1900,350);animateBranch('t5',1950,350);
  animateBranch('t6',2050,300);animateBranch('t7',2100,300);animateBranch('t8',2150,300);

  // Spawn hearts after branches
  heartPositions.forEach((pos,i)=>{
    spawnHeart(pos, 2400 + i*120);
  });

  // Bottom lines
  const lastHeart = 2400 + heartPositions.length*120;
  showLine('bl1', lastHeart + 200);
  showLine('bl2', lastHeart + 600);
  showLine('bl3', lastHeart + 1000);
  showLine('bl4', lastHeart + 1200);
  showLine('bl5', lastHeart + 1600);
  showLine('bl6', lastHeart + 2000);

  setTimeout(()=>{
    document.getElementById('replayBtn').classList.add('show');
  }, lastHeart + 2400);
}

// Start on load
window.addEventListener('load', ()=> setTimeout(startAnimation, 600));
</script>
</body>
</html>
